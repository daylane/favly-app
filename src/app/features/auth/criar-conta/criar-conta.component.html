<div class="auth-page">
  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-hero">
      <div class="auth-logo">
        <div class="logo-mark">
          <span class="logo-brick b1"></span><span class="logo-brick b2"></span>
          <span class="logo-brick b3"></span><span class="logo-brick b4"></span>
        </div>
        <span class="logo-word">favly</span>
      </div>
      <p class="auth-tag">despensa compartilhada</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab" type="button" (click)="onLogin()">entrar</button>
        <button class="auth-tab auth-tab-active" type="button">cadastrar</button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">

        <!-- Avatar -->
        <div class="avatar-section">
          <div class="avatar-wrapper" (click)="avatarInput.click()" role="button"
            [attr.aria-label]="avatarPreview ? 'Trocar foto' : 'Adicionar foto'">
            <img *ngIf="avatarPreview" [src]="avatarPreview" class="avatar-img" alt="Avatar" />
            <div *ngIf="!avatarPreview" class="avatar-placeholder">
              <mat-icon>add_a_photo</mat-icon>
              <span>foto de perfil</span>
            </div>
          </div>
          <button *ngIf="avatarPreview" type="button" class="avatar-remove" (click)="removeAvatar()">✕</button>
          <input #avatarInput type="file" accept="image/*" hidden (change)="onAvatarSelected($event)" />
        </div>

        <label class="field">
          <span class="field-label">nome completo</span>
          <div class="field-input">
            <input type="text" formControlName="nome" placeholder="Seu nome completo" autocomplete="name" />
          </div>
          <span class="field-error" *ngIf="nomeError">{{ nomeError }}</span>
        </label>

        <label class="field">
          <span class="field-label">e-mail</span>
          <div class="field-input">
            <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
        </label>

        <label class="field">
          <span class="field-label">senha</span>
          <div class="field-input">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="senha"
              placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="field-eye" (click)="togglePasswordVisibility()">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <span class="field-hint">mínimo de 6 caracteres</span>
          <span class="field-error" *ngIf="senhaError">{{ senhaError }}</span>
        </label>

        <div class="error-alert" *ngIf="errorMessage" role="alert">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <button type="submit" class="btn btn-block" [disabled]="isLoading">
          <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
          <span *ngIf="!isLoading">criar conta</span>
        </button>

      </form>

      <div class="auth-foot">
        <span>já tem uma conta?</span>
        <button type="button" class="link-btn" (click)="onLogin()">entrar</button>
      </div>

    </div>

  </div>
</div>
