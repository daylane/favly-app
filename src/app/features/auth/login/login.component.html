<div class="auth-page">

  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-hero">
      <div class="auth-logo">
        <div class="logo-mark">
          <span class="logo-brick b1"></span><span class="logo-brick b2"></span>
          <span class="logo-brick b3"></span><span class="logo-brick b4"></span>
        </div>
        <span class="logo-word">favly</span>
      </div>
      <p class="auth-tag">despensa compartilhada</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs login / cadastro -->
      <div class="auth-tabs">
        <button class="auth-tab auth-tab-active" type="button">entrar</button>
        <button class="auth-tab" type="button" (click)="onCreateAccount()">cadastrar</button>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="auth-form">

        <label class="field">
          <span class="field-label">e-mail</span>
          <div class="field-input">
            <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
        </label>

        <label class="field">
          <span class="field-label">senha</span>
          <div class="field-input">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="senha"
              placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="field-eye" (click)="togglePasswordVisibility()">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <span class="field-error" *ngIf="passwordError">{{ passwordError }}</span>
        </label>

        <div class="forgot-row">
          <button type="button" class="forgot-btn" (click)="onForgotPassword()">esqueci minha senha</button>
        </div>

        <!-- Erro geral -->
        <div class="error-alert" *ngIf="errorMessage" role="alert">
          <mat-icon>error_outline</mat-icon>
          <div class="error-content">
            <span>{{ errorMessage }}</span>
            <button *ngIf="contaNaoAtivada" type="button" class="btn-ativar-inline" (click)="abrirDialogAtivacao()">
              inserir código de ativação
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-block" [disabled]="isLoading">
          <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
          <span *ngIf="!isLoading">entrar</span>
        </button>

      </form>

      <div class="auth-foot">
        <span>ainda não tem conta?</span>
        <button type="button" class="link-btn" (click)="onCreateAccount()">crie sua conta</button>
      </div>

    </div>

  </div>
</div>
