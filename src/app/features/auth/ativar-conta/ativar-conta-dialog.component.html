<div class="dialog-wrap">

  <div class="dialog-icon">✉</div>
  <h2 mat-dialog-title>ativar conta</h2>

  <mat-dialog-content>

    <p class="dialog-subtitle">
      enviamos um código de ativação para<br>
      <strong>{{ data.email }}</strong>
    </p>

    <form [formGroup]="form" (ngSubmit)="onConfirmar()" novalidate class="dialog-form">
      <label class="field">
        <span class="field-label">código de ativação</span>
        <div class="field-input">
          <input formControlName="codigo" placeholder="123456" autocomplete="one-time-code" inputmode="numeric" />
        </div>
        <span class="field-error" *ngIf="codigoError">{{ codigoError }}</span>
      </label>
    </form>

    <div class="error-alert" *ngIf="errorMessage()" role="alert">
      <mat-icon>error_outline</mat-icon>
      <span>{{ errorMessage() }}</span>
    </div>

    <div class="reenvio-section">
      <span class="reenvio-label">não recebeu o código?</span>
      <span *ngIf="reenvioCountdown() > 0" class="reenvio-countdown">
        <mat-icon>timer</mat-icon>
        reenviar em {{ reenvioCountdown() }}s
      </span>
      <button *ngIf="reenvioCountdown() === 0" type="button" class="btn-reenviar"
        (click)="onReenviar()" [disabled]="isResending()">
        <mat-spinner *ngIf="isResending()" diameter="14"></mat-spinner>
        <span>{{ isResending() ? 'enviando...' : 'reenviar código' }}</span>
      </button>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" class="btn-cancelar" (click)="onCancelar()" [disabled]="isLoading()">cancelar</button>
    <button type="button" class="btn btn-ativar" (click)="onConfirmar()" [disabled]="isLoading()">
      <mat-spinner *ngIf="isLoading()" diameter="18"></mat-spinner>
      <span *ngIf="!isLoading()">ativar conta</span>
    </button>
  </mat-dialog-actions>

</div>
