<div class="dialog-wrap">

  <div class="dialog-icon-top">＋</div>
  <h2 mat-dialog-title>registrar entrada</h2>

  <mat-dialog-content>

    <p class="dialog-subtitle">informe os dados da entrada de estoque</p>

    <form [formGroup]="form" novalidate class="dialog-form">

      <label class="field">
        <span class="field-label">produto</span>
        <div class="field-input field-select">
          <select formControlName="produtoId">
            <option value="" disabled>selecione o produto...</option>
            <option *ngFor="let p of data.produtos" [value]="p.id">{{ p.nome }}</option>
          </select>
        </div>
        <span class="field-error" *ngIf="produtoError">{{ produtoError }}</span>
      </label>

      <div class="row-2">
        <label class="field">
          <span class="field-label">quantidade</span>
          <div class="field-input">
            <input type="number" formControlName="quantidade" placeholder="0" min="1" />
            <span class="field-suffix" *ngIf="produtoSelecionado">
              {{ unidadesMap[produtoSelecionado.unidade] }}
            </span>
          </div>
          <span class="field-error" *ngIf="quantidadeError">{{ quantidadeError }}</span>
        </label>

        <label class="field">
          <span class="field-label">preço unit. <span class="optional">(opcional)</span></span>
          <div class="field-input">
            <span class="field-prefix">R$</span>
            <input type="number" formControlName="preco" placeholder="0,00" min="0" step="0.01" />
          </div>
        </label>
      </div>

      <label class="field">
        <span class="field-label">mercado / local <span class="optional">(opcional)</span></span>
        <div class="field-input">
          <input formControlName="mercadoId" placeholder="id do mercado (se tiver)" autocomplete="off" />
        </div>
        <span class="field-hint">deixe em branco se não aplicável</span>
      </label>

      <label class="field">
        <span class="field-label">observação <span class="optional">(opcional)</span></span>
        <div class="field-input field-textarea">
          <textarea formControlName="observacao" placeholder="ex: comprado no mercado X..." rows="2" maxlength="200"></textarea>
        </div>
        <span class="field-hint">{{ form.get('observacao')?.value?.length ?? 0 }}/200</span>
      </label>

    </form>

    <!-- Resumo -->
    <div class="resumo-card" *ngIf="produtoSelecionado && quantidadeControl.value > 0">
      <span class="resumo-icon">◉</span>
      <span>
        entrada de <strong>{{ quantidadeControl.value }} {{ unidadesMap[produtoSelecionado.unidade] }}</strong>
        de <strong>{{ produtoSelecionado.nome }}</strong>
        <span *ngIf="precoControl.value > 0">
          · total: <strong>{{ (quantidadeControl.value * precoControl.value) | currency:'BRL' }}</strong>
        </span>
      </span>
    </div>

    <div class="error-alert" *ngIf="errorMessage()">
      <mat-icon>error_outline</mat-icon>
      <span>{{ errorMessage() }}</span>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" class="btn-cancelar" (click)="onCancelar()" [disabled]="isLoading()">cancelar</button>
    <button type="button" class="btn btn-confirmar" (click)="onSalvar()" [disabled]="isLoading()">
      <mat-spinner *ngIf="isLoading()" diameter="18"></mat-spinner>
      <span *ngIf="!isLoading()">confirmar entrada</span>
    </button>
  </mat-dialog-actions>

</div>
