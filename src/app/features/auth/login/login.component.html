<div class="auth-page">
  <div class="auth-wrap">

    <div class="auth-hero">
      <div class="auth-logo">
        <div class="logo-mark">
          <span class="logo-brick b1"></span><span class="logo-brick b2"></span>
          <span class="logo-brick b3"></span><span class="logo-brick b4"></span>
        </div>
        <span class="logo-word">favly</span>
      </div>
      <p class="auth-tag">despensa compartilhada</p>
    </div>

    <div class="auth-card">

      <div class="auth-tabs">
        <button class="auth-tab auth-tab-active" type="button">entrar</button>
        <button class="auth-tab" type="button" (click)="onCreateAccount()">cadastrar</button>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="auth-form">

        <label class="field">
          <span class="field-label">e-mail</span>
          <div class="field-input">
            <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
        </label>

        <label class="field">
          <span class="field-label">senha</span>
          <div class="field-input">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="senha"
              placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="field-eye" (click)="togglePasswordVisibility()">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <span class="field-error" *ngIf="senhaError">{{ senhaError }}</span>
        </label>

        <div class="forgot-row">
          <button type="button" class="forgot-btn" (click)="onForgotPassword()">esqueci minha senha</button>
        </div>

        <!-- Erro geral -->
        <div class="error-alert" *ngIf="errorMessage" role="alert">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Bloco de ativação — aparece quando conta não ativada -->
        <div *ngIf="contaNaoAtivada" class="ativacao-block">

          <label class="field">
            <span class="field-label">código de ativação</span>
            <div class="field-input">
              <input type="text" inputmode="numeric" [formControl]="codigoControl"
                placeholder="123456" autocomplete="one-time-code" maxlength="8" />
            </div>
            <span class="field-error" *ngIf="codigoError">{{ codigoError }}</span>
            <span class="field-error" *ngIf="ativacaoError && !codigoError">{{ ativacaoError }}</span>
          </label>

          <div class="reenvio-row">
            <span class="reenvio-label">não recebeu o código?</span>
            <span *ngIf="reenvioCountdown > 0" class="reenvio-countdown">
              <mat-icon>timer</mat-icon>{{ reenvioCountdown }}s
            </span>
            <button *ngIf="reenvioCountdown === 0" type="button"
              class="btn-reenviar" (click)="onReenviar()" [disabled]="isResending">
              <mat-spinner *ngIf="isResending" diameter="12"></mat-spinner>
              <span>{{ isResending ? 'enviando...' : 'reenviar código' }}</span>
            </button>
          </div>

        </div>

        <button type="submit" class="btn btn-block"
          [disabled]="isLoading || isActivating">
          <mat-spinner *ngIf="isLoading || isActivating" diameter="18"></mat-spinner>
          <span *ngIf="!isLoading && !isActivating">
            {{ contaNaoAtivada ? 'ativar conta' : 'entrar' }}
          </span>
        </button>

      </form>

      <div class="auth-foot">
        <span>ainda não tem conta?</span>
        <button type="button" class="link-btn" (click)="onCreateAccount()">crie sua conta</button>
      </div>

    </div>
  </div>
</div>
