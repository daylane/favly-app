<div class="auth-page">
  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-hero">
      <div class="auth-logo">
        <div class="logo-mark">
          <span class="logo-brick b1"></span><span class="logo-brick b2"></span>
          <span class="logo-brick b3"></span><span class="logo-brick b4"></span>
        </div>
        <span class="logo-word">favly</span>
      </div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Estado: aguardando envio -->
      <ng-container *ngIf="!enviado()">

        <div class="card-header">
          <div class="card-icon">◎</div>
          <h2>esqueceu a senha?</h2>
          <p>informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">

          <label class="field">
            <span class="field-label">e-mail</span>
            <div class="field-input">
              <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email" />
            </div>
            <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
          </label>

          <div class="error-alert" *ngIf="errorMessage()" role="alert">
            <mat-icon>error_outline</mat-icon>
            <span>{{ errorMessage() }}</span>
          </div>

          <button type="submit" class="btn btn-block" [disabled]="isLoading()">
            <mat-spinner *ngIf="isLoading()" diameter="18"></mat-spinner>
            <span *ngIf="!isLoading()">enviar link de redefinição</span>
          </button>

        </form>

      </ng-container>

      <!-- Estado: e-mail enviado -->
      <ng-container *ngIf="enviado()">
        <div class="success-state">
          <div class="success-icon">✉</div>
          <h2>e-mail enviado!</h2>
          <p>verifique sua caixa de entrada e siga as instruções. o link expira em <strong>30 minutos</strong>.</p>
          <button class="btn btn-block" type="button" (click)="irParaRedefinir()">já tenho o token</button>
        </div>
      </ng-container>

      <div class="auth-foot">
        <button type="button" class="back-btn" (click)="onVoltar()">‹ voltar para o login</button>
      </div>

    </div>
  </div>
</div>
