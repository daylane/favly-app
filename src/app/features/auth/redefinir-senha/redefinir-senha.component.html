<div class="auth-page">
  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-hero">
      <div class="auth-logo">
        <div class="logo-mark">
          <span class="logo-brick b1"></span><span class="logo-brick b2"></span>
          <span class="logo-brick b3"></span><span class="logo-brick b4"></span>
        </div>
        <span class="logo-word">favly</span>
      </div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div class="card-header">
        <div class="card-icon">◇</div>
        <h2>redefinir senha</h2>
        <p>insira o token recebido por e-mail e defina sua nova senha.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">

        <label class="field">
          <span class="field-label">token de redefinição</span>
          <div class="field-input">
            <input type="text" formControlName="token" placeholder="cole o token do e-mail" autocomplete="off" />
          </div>
          <span class="field-error" *ngIf="tokenError">{{ tokenError }}</span>
        </label>

        <label class="field">
          <span class="field-label">nova senha</span>
          <div class="field-input">
            <input [type]="showNovaSenha() ? 'text' : 'password'" formControlName="novaSenha"
              placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="field-eye" (click)="showNovaSenha.set(!showNovaSenha())">
              <mat-icon>{{ showNovaSenha() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <span class="field-hint">mínimo de 6 caracteres</span>
          <span class="field-error" *ngIf="novaSenhaError">{{ novaSenhaError }}</span>
        </label>

        <label class="field">
          <span class="field-label">confirmar nova senha</span>
          <div class="field-input">
            <input [type]="showConfirmacao() ? 'text' : 'password'" formControlName="confirmacaoSenha"
              placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="field-eye" (click)="showConfirmacao.set(!showConfirmacao())">
              <mat-icon>{{ showConfirmacao() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <span class="field-error" *ngIf="confirmacaoError">{{ confirmacaoError }}</span>
        </label>

        <div class="error-alert" *ngIf="errorMessage()" role="alert">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>

        <button type="submit" class="btn btn-block" [disabled]="isLoading()">
          <mat-spinner *ngIf="isLoading()" diameter="18"></mat-spinner>
          <span *ngIf="!isLoading()">redefinir senha</span>
        </button>

      </form>

      <div class="auth-foot">
        <button type="button" class="back-btn" (click)="onVoltar()">‹ voltar</button>
      </div>

    </div>
  </div>
</div>
